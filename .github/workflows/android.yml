name: Android CI

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Logs Folder
        run: mkdir -p logs

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace --info > full_output.txt 2>&1 || touch build_failed

      - name: Generate Smart Build Log
        run: |
          if [ -f build_failed ]; then
            echo "BUILD FAILED" > logs/build-log.txt
            echo "===================================" >> logs/build-log.txt
            echo "DETECTED ERRORS:" >> logs/build-log.txt
            # Extract lines starting with 'e:' (Kotlin errors) or 'error:'
            grep -E "^e: |^error:|^.*: error:" full_output.txt | head -n 100 >> logs/build-log.txt
            echo "" >> logs/build-log.txt
            echo "===================================" >> logs/build-log.txt
            echo "FINAL SUMMARY:" >> logs/build-log.txt
            # Get the tail of the log which contains the Gradle failure summary
            tail -n 100 full_output.txt >> logs/build-log.txt
            exit 1
          else
            echo "Build Successful" > logs/build-log.txt
          fi

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: logs/build-log.txt

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
